<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connexion — Légal Connect</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    body { background: linear-gradient(135deg, #1B4F72, #1B4F72); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .login-card { background: white; border-radius: 16px; padding: 2.5rem; width: 100%; max-width: 440px; box-shadow: 0 20px 60px rgba(0,0,0,0.2); }
    .logo { font-size: 3rem; text-align: center; margin-bottom: 0.5rem; }
    .brand { color: #1B4F72; font-weight: 700; font-size: 1.6rem; text-align: center; }
    .subtitle { color: #888; text-align: center; font-size: 0.9rem; margin-bottom: 1.5rem; }
    .btn-login { background: #1B4F72; color: white; width: 100%; padding: 0.75rem; font-size: 1rem; border: none; border-radius: 8px; }
    .btn-login:hover { background: #2E86C1; color: white; }
    .form-control:focus { border-color: #2E86C1; box-shadow: 0 0 0 0.2rem rgba(46,134,193,0.25); }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="logo">⚖</div>
    <div class="brand">Légal Connect</div>
    <div class="subtitle">Plateforme de formalisation juridique</div>

    {% if messages %}
      {% for message in messages %}
      <div class="alert alert-{{ message.tags }} py-2">{{ message }}</div>
      {% endfor %}
    {% endif %}

    <form method="post">
      {% csrf_token %}
      <div class="mb-3">
        <label class="form-label fw-bold">Nom d'utilisateur</label>
        <input type="text" name="username" class="form-control" placeholder="Entrez votre identifiant" required autofocus>
      </div>
      <div class="mb-3">
        <label class="form-label fw-bold">Mot de passe</label>
        <input type="password" name="password" class="form-control" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn btn-login mb-3">
        <i class="bi bi-box-arrow-in-right"></i> Se connecter
      </button>
    </form>

    <div class="text-center text-muted" style="font-size:14px;">
      Pas encore de compte ?
      <a href="{% url 'accounts:inscription' %}" style="color:#2E86C1; font-weight:600;">S'inscrire</a>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
